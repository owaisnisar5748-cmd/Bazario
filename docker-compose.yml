services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - bazario_mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: development
      MONGODB_URL: mongodb://mongo:27017
      DATABASE_NAME: bazario_db
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: /api
        REACT_APP_API_TIMEOUT: 10000
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  bazario_mongo:
