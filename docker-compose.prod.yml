services:
  mongo:
    image: mongo:8
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?Set MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?Set MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - bazario_mongo:/data/db
    networks:
      - bazario_internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build: ./backend
    restart: always
    env_file:
      - ./.env.production
    environment:
      APP_ENV: production
      MONGODB_HOST: mongo
      MONGODB_URL: ""
      DATABASE_NAME: ${DATABASE_NAME:-bazario_db}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?Set MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?Set MONGO_INITDB_ROOT_PASSWORD}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?Set ALLOWED_ORIGINS}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?Set ALLOWED_HOSTS},backend,localhost,127.0.0.1
    expose:
      - "8000"
    networks:
      - bazario_internal
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: /api
        REACT_APP_API_TIMEOUT: ${REACT_APP_API_TIMEOUT:-10000}
    restart: always
    ports:
      - "${HTTP_PORT:-80}:8080"
    networks:
      - bazario_internal
    depends_on:
      backend:
        condition: service_healthy

volumes:
  bazario_mongo:

networks:
  bazario_internal:
    driver: bridge
